# ============================================================
# Barcode Portal Automation System — Docker Compose
#
# Usage:
#   cp .env.example .env   ← first time only
#   nano .env              ← set your passwords + APP_URL
#   docker compose up -d --build
#
# All environment variables are loaded from .env automatically.
# ============================================================

services:

  # ── MySQL Database ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: barcode_mysql
    restart: unless-stopped
    env_file:
      - .env
    # MySQL container uses the MYSQL_* variables from .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-barcode_portal}
      MYSQL_USER:          ${MYSQL_USER:-barcode_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - automation-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── PHP Backend (Apache + PHP 8.2) ─────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: barcode_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Docker-specific overrides (service name replaces localhost)
      DB_HOST:     mysql
      DB_PORT:     "3306"
      DB_NAME:     ${MYSQL_DATABASE:-barcode_portal}
      DB_USER:     ${MYSQL_USER:-barcode_user}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      # Paths inside the backend container (volumes mounted here)
      UPLOAD_PATH: /var/www/html/uploads
      LOG_PATH:    /var/www/html/logs
    volumes:
      - uploads_data:/var/www/html/uploads
      - screenshots_data:/var/www/html/bot/screenshots
      - downloads_data:/var/www/html/bot/downloads
      - logs_data:/var/www/html/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - automation-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/api/jobs.php"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── React Frontend (Node build → Nginx static) ─────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # REACT_APP_* vars are baked into the JS bundle at build time.
        # /api is correct for Docker: nginx proxies /api → backend.
        REACT_APP_API_URL:  ${REACT_APP_API_URL:-/api}
        REACT_APP_APP_NAME: ${REACT_APP_APP_NAME:-Barcode Portal}
    container_name: barcode_frontend
    restart: unless-stopped
    networks:
      - automation-network

  # ── Python Automation Bot (Playwright + Chromium) ──────────
  python-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: barcode_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Docker-specific overrides
      API_BASE_URL:    http://nginx/api
      HEADLESS:        "true"
      SLOW_MO:         "0"
      # Paths inside the bot container (volumes mounted here)
      DOWNLOAD_PATH:   /app/downloads
      SCREENSHOT_PATH: /app/screenshots
      LOG_PATH:        /app/logs
    volumes:
      - uploads_data:/app/uploads
      - screenshots_data:/app/screenshots
      - downloads_data:/app/downloads
      - bot_logs:/app/logs
    depends_on:
      backend:
        condition: service_healthy
      nginx:
        condition: service_started
    networks:
      - automation-network
    healthcheck:
      test: ["CMD", "python", "-c",
             "import requests; r=requests.get('http://nginx/api/jobs.php',timeout=5); exit(0 if r.status_code==200 else 1)"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 45s

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: barcode_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - automation-network

# ── Named Volumes ──────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
  screenshots_data:
    driver: local
  downloads_data:
    driver: local
  logs_data:
    driver: local
  bot_logs:
    driver: local

# ── Internal Network ───────────────────────────────────────────
networks:
  automation-network:
    driver: bridge
    name: automation-network
