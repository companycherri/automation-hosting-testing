# ============================================================
# Nginx Reverse Proxy — Production Configuration
#
# Routing:
#   /           → frontend (React SPA)
#   /api/       → backend (PHP Apache)
#   /portals/   → backend (PHP dummy portals)
#   /uploads/   → backend (uploaded files)
#   /bot/       → backend (screenshots, downloads)
#   /init.php   → backend (one-time setup)
#   /update-schema.php → backend (migrations)
# ============================================================

# ── Security ───────────────────────────────────────────────
server_tokens off;

# ── Rate limiting zones ────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=api_limit:10m  rate=60r/m;
limit_req_zone  $binary_remote_addr zone=upload_limit:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Upstream services ──────────────────────────────────────
upstream frontend_service {
    server frontend:80;
    keepalive 16;
}

upstream backend_service {
    server backend:80;
    keepalive 16;
}

# ── HTTP → HTTPS redirect (uncomment when SSL is configured)
# server {
#     listen 80;
#     server_name yourdomain.com www.yourdomain.com;
#     return 301 https://$server_name$request_uri;
# }

# ── Main server block ──────────────────────────────────────
server {
    listen 80;
    server_name _;                   # Change to your domain

    # ── File upload limits ─────────────────────────────────
    client_max_body_size      50M;
    client_body_timeout       120s;
    client_header_timeout     30s;

    # ── Security headers ───────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Gzip ───────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   5;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml application/xml;

    # ── Health check (internal use) ────────────────────────
    location = /health {
        access_log  off;
        return 200  "OK\n";
        add_header  Content-Type text/plain;
    }

    # ── PHP Backend: API ───────────────────────────────────
    location /api/ {
        limit_req   zone=api_limit burst=30 nodelay;
        limit_conn  conn_limit 20;

        proxy_pass         http://backend_service/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── PHP Backend: Portals (dummy portals for testing) ───
    location /portals/ {
        proxy_pass         http://backend_service/portals/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # ── PHP Backend: Legacy dummy-portal ──────────────────
    location /dummy-portal/ {
        proxy_pass         http://backend_service/dummy-portal/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Connection        "";
    }

    # ── PHP Backend: Uploaded files ────────────────────────
    location /uploads/ {
        limit_req  zone=upload_limit burst=5 nodelay;
        proxy_pass http://backend_service/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection "";

        # Prevent execution of uploaded PHP files
        location ~* /uploads/.*\.php$ {
            return 403;
        }
    }

    # ── PHP Backend: Bot files (screenshots, downloads) ───
    location /bot/ {
        proxy_pass         http://backend_service/bot/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection "";

        # Prevent execution of PHP in bot directories
        location ~* /bot/.*\.php$ {
            return 403;
        }
    }

    # ── PHP Backend: Admin utilities ──────────────────────
    # Restrict init.php and update-schema.php to local network only
    location ~ ^/(init|update-schema)\.php$ {
        allow  127.0.0.1;
        allow  172.16.0.0/12;   # Docker internal networks
        allow  10.0.0.0/8;
        deny   all;
        proxy_pass         http://backend_service;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection "";
    }

    # ── React Frontend (catch-all) ─────────────────────────
    location / {
        proxy_pass         http://frontend_service/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }
}

